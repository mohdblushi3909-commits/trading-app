<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gold Hunter V10.0</title>
    <style>
        :root { --bg: #040508; --card: #0d1117; --gold: #ffcc00; --green: #00ffaa; --red: #ff3b5c; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; }
        .dashboard { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #1c212d; text-align: center; margin-bottom: 15px; box-shadow: 0 0 30px rgba(255, 204, 0, 0.05); }
        .symbol { color: var(--gold); font-size: 14px; font-weight: bold; letter-spacing: 2px; }
        .price { font-size: 42px; font-weight: 900; margin: 10px 0; }
        
        /* Risk Manager */
        .risk-manager { background: rgba(255, 204, 0, 0.05); border: 1px solid rgba(255, 204, 0, 0.2); border-radius: 15px; padding: 15px; margin: 15px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .r-label { font-size: 10px; color: #848e9c; }
        .r-val { font-size: 16px; font-weight: bold; color: var(--gold); }

        /* Powerful Signal Box */
        .signal-box { padding: 25px; border-radius: 18px; font-size: 20px; font-weight: 900; text-transform: uppercase; margin: 20px 0; border: 2px solid transparent; transition: 0.5s; }
        .buy { background: rgba(0, 255, 170, 0.1); color: var(--green); border-color: var(--green); box-shadow: 0 0 30px rgba(0, 255, 170, 0.2); }
        .sell { background: rgba(255, 59, 92, 0.1); color: var(--red); border-color: var(--red); box-shadow: 0 0 30px rgba(255, 59, 92, 0.2); }
        .wait { background: #161a23; color: #525f7a; }

        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .lvl-box { background: #161a23; padding: 15px; border-radius: 15px; border-bottom: 3px solid #333; }
        
        #tv-chart { height: 420px; border-radius: 20px; overflow: hidden; border: 1px solid #1c212d; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="symbol">XAU/USD • GOLD ELITE</div>
        <div id="price" class="price">0000.00</div>

        <div class="risk-manager">
            <div><span class="r-label">LOT SIZE (GOLD)</span><br><span class="r-val">0.01 - 0.02</span></div>
            <div><span class="r-label">EQUITY REQ.</span><br><span class="r-val">$100+</span></div>
        </div>
        
        <div id="signal" class="signal-box wait">ANALYZING GOLD...</div>

        <div class="levels" id="lvl-container" style="display: none;">
            <div class="lvl-box" style="border-color: var(--red);">
                <span class="r-label">STOP LOSS</span><br>
                <span id="sl" style="color: var(--red); font-weight: bold;">--</span>
            </div>
            <div class="lvl-box" style="border-color: var(--green);">
                <span class="r-label">TAKE PROFIT</span><br>
                <span id="tp" style="color: var(--green); font-weight: bold;">--</span>
            </div>
        </div>
    </div>

    <div id="tv-chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Gold Chart Config
        new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "5", "theme": "dark", "container_id": "tv-chart", "style": "1" });

        async function goldAnalysis() {
            try {
                // Fetching Gold/Silver/Crypto prices from Binance for high-speed
                const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
                const d = await r.json();
                const p = parseFloat(d.lastPrice); // Gold Token Price
                const c = parseFloat(d.priceChangePercent);

                document.getElementById('price').innerText = "$" + p.toFixed(2);

                const sBox = document.getElementById('signal');
                const lBox = document.getElementById('lvl-container');

                // GOLD SCALPING LOGIC (XAU is sensitive, so 0.30% is a strong move)
                if (c > 0.30) {
                    sBox.innerText = "🔱 STRONG BUY GOLD ▲";
                    sBox.className = "signal-box buy";
                    lBox.style.display = "grid";
                    document.getElementById('sl').innerText = (p - 4).toFixed(2); // $4 Safety Gap
                    document.getElementById('tp').innerText = (p + 8).toFixed(2); // $8 Profit Target
                } else if (c < -0.30) {
                    sBox.innerText = "🔥 STRONG SELL GOLD ▼";
                    sBox.className = "signal-box sell";
                    lBox.style.display = "grid";
                    document.getElementById('sl').innerText = (p + 4).toFixed(2);
                    document.getElementById('tp').innerText = (p - 8).toFixed(2);
                } else {
                    sBox.innerText = "⏳ GOLD CONSOLIDATING...";
                    sBox.className = "signal-box wait";
                    lBox.style.display = "none";
                }
            } catch (e) {}
        }
        setInterval(goldAnalysis, 3000); goldAnalysis();
    </script>
</body>
</html>
