<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Safe-Trade Terminal</title>
    <style>
        :root { --bg: #05070a; --card: #12151c; --accent: #f0b90b; --green: #02d39a; --red: #f6465d; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #2b2f36; margin-bottom: 15px; text-align: center; }
        .price-display { font-size: 36px; font-weight: 800; color: white; margin: 10px 0; }
        
        /* Dynamic Signal Box */
        .signal-indicator { font-size: 18px; font-weight: bold; padding: 15px; border-radius: 12px; margin-bottom: 15px; transition: 0.3s; }
        .no-trade { background: #1e2329; color: #5f666e; border: 1px dashed #4a4f55; }
        
        /* Action Buttons Container */
        #action-area { display: none; margin-top: 15px; }
        .btn-group { display: flex; gap: 10px; }
        .trade-btn { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .buy-btn { background: var(--green); color: black; box-shadow: 0 0 20px rgba(2, 211, 154, 0.3); }
        .sell-btn { background: var(--red); color: white; box-shadow: 0 0 20px rgba(246, 70, 93, 0.3); }

        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .level-val { display: block; font-size: 16px; font-weight: bold; margin-top: 4px; }
        #tv-chart { height: 400px; border-radius: 20px; border: 1px solid #2b2f36; overflow: hidden; }
    </style>
</head>
<body>

    <div class="card">
        <div style="color: var(--accent); font-weight: bold; margin-bottom: 5px;">BTC/USDT 5M ANALYSIS</div>
        <div id="price" class="price-display">--</div>
        
        <div id="signal-box" class="signal-indicator no-trade">
            ⏳ NO TRADE ZONE - MARKET UNSTABLE
        </div>

        <div id="action-area">
            <div class="btn-group">
                <button id="buy-btn" class="trade-btn buy-btn">BUY / LONG ▲</button>
                <button id="sell-btn" class="trade-btn sell-btn">SELL / SHORT ▼</button>
            </div>
            <div class="levels">
                <div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:10px;">
                    <span style="font-size:10px; color:#848e9c;">STOP LOSS</span>
                    <span id="sl" class="level-val" style="color:var(--red);">--</span>
                </div>
                <div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:10px;">
                    <span style="font-size:10px; color:#848e9c;">TAKE PROFIT</span>
                    <span id="tp" class="level-val" style="color:var(--green);">--</span>
                </div>
            </div>
        </div>
    </div>

    <div id="tv-chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        async function checkMarket() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const data = await res.json();
                const price = parseFloat(data.lastPrice);
                const change = parseFloat(data.priceChangePercent);

                document.getElementById('price').innerText = "$" + price.toLocaleString();
                
                const sigBox = document.getElementById('signal-box');
                const actionArea = document.getElementById('action-area');
                const bBtn = document.getElementById('buy-btn');
                const sBtn = document.getElementById('sell-btn');

                // Strict Logic: Only show buttons if change is strong (> 0.45% or < -0.45%)
                if (change > 0.45) {
                    sigBox.innerText = "🚀 STRONG BUY TREND";
                    sigBox.style.background = "rgba(2, 211, 154, 0.2)";
                    sigBox.style.color = "var(--green)";
                    actionArea.style.display = "block";
                    bBtn.style.display = "block";
                    sBtn.style.display = "none"; // Hide sell button on buy trend
                    document.getElementById('sl').innerText = (price * 0.995).toFixed(2);
                    document.getElementById('tp').innerText = (price * 1.018).toFixed(2);
                } else if (change < -0.45) {
                    sigBox.innerText = "📉 STRONG SELL TREND";
                    sigBox.style.background = "rgba(246, 70, 93, 0.2)";
                    sigBox.style.color = "var(--red)";
                    actionArea.style.display = "block";
                    sBtn.style.display = "block";
                    bBtn.style.display = "none"; // Hide buy button on sell trend
                    document.getElementById('sl').innerText = (price * 1.005).toFixed(2);
                    document.getElementById('tp').innerText = (price * 0.982).toFixed(2);
                } else {
                    // RESET - Hide everything when market is risky
                    sigBox.innerText = "⏳ NO TRADE ZONE - WAIT";
                    sigBox.className = "signal-indicator no-trade";
                    sigBox.style.background = "#1e2329";
                    sigBox.style.color = "#5f666e";
                    actionArea.style.display = "none";
                }
            } catch (e) { console.log("System Scanning..."); }
        }

        setInterval(checkMarket, 2500);
        checkMarket();

        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "5",
            "theme": "dark",
            "container_id": "tv-chart",
            "backgroundColor": "#05070a"
        });
    </script>
</body>
</html>
