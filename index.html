<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Dashboard</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: Arial, sans-serif; margin: 0; text-align: center; }
        .dashboard { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
        .signal-buy { color: #26a69a; font-size: 24px; font-weight: bold; }
        .signal-sell { color: #ef5350; font-size: 24px; font-weight: bold; }
        .price { font-size: 30px; margin: 10px 0; color: #f0b90b; }
        .target { color: #8b949e; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Live AI Trading Signals</h2>
    <div class="price" id="btc-price">Loading...</div>
    
    <div class="dashboard">
        <div class="card">
            <div>Current Signal</div>
            <div id="signal" class="signal-buy">ANALYZING...</div>
        </div>
        <div class="card">
            <div>Confidence</div>
            <div id="conf">85%</div>
        </div>
        <div class="card">
            <div class="target">Stop Loss</div>
            <div id="sl" style="color: #ef5350;">--</div>
        </div>
        <div class="card">
            <div class="target">Take Profit</div>
            <div id="tp" style="color: #26a69a;">--</div>
        </div>
    </div>

    <div id="chart-container" style="height: 300px; width: 100%;"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Binance Live Price
        const priceDisplay = document.getElementById('btc-price');
        const signalDisplay = document.getElementById('signal');
        const slDisplay = document.getElementById('sl');
        const tpDisplay = document.getElementById('tp');

        let ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (event) => {
            let data = JSON.parse(event.data);
            let price = parseFloat(data.c).toFixed(2);
            priceDisplay.innerText = "$" + price;
            
            // Simple Logic for Signal (Example)
            if (parseFloat(data.P) > 0) {
                signalDisplay.innerText = "BUY";
                signalDisplay.className = "signal-buy";
                slDisplay.innerText = (price * 0.995).toFixed(2);
                tpDisplay.innerText = (price * 1.01).toFixed(2);
            } else {
                signalDisplay.innerText = "SELL";
                signalDisplay.className = "signal-sell";
                slDisplay.innerText = (price * 1.005).toFixed(2);
                tpDisplay.innerText = (price * 0.99).toFixed(2);
            }
        };

        new TradingView.widget({
            "container_id": "chart-container",
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "1",
            "theme": "dark",
            "style": "1",
            "hide_top_toolbar": true
        });
    </script>
</body>
</html>
