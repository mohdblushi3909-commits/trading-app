<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ultra Trading Hub</title>
    <style>
        :root { --bg: #05070a; --card: #12151c; --accent: #f0b90b; --green: #02d39a; --red: #f6465d; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 12px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 15px; border-bottom: 1px solid #2b2f36; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #2b2f36; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .pair-title { font-size: 14px; color: #848e9c; font-weight: 600; }
        .price-main { font-size: 28px; font-weight: 800; margin: 8px 0; letter-spacing: -1px; }
        .signal-badge { display: inline-block; padding: 6px 15px; border-radius: 12px; font-size: 14px; font-weight: bold; margin: 10px 0; text-transform: uppercase; }
        .buy-style { background: rgba(2, 211, 154, 0.15); color: var(--green); border: 1px solid var(--green); }
        .sell-style { background: rgba(246, 70, 93, 0.15); color: var(--red); border: 1px solid var(--red); }
        .wait-style { background: #2b2f36; color: #848e9c; }
        .stats-row { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }
        .acc-bar { height: 4px; background: #2b2f36; border-radius: 2px; margin-top: 8px; width: 100%; }
        .acc-fill { height: 100%; background: var(--accent); width: 92%; border-radius: 2px; box-shadow: 0 0 10px var(--accent); }
        #tv-chart { height: 400px; border-radius: 20px; margin-top: 15px; border: 1px solid #2b2f36; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color: var(--accent); font-weight: 900;">AI PREDICTOR <span style="font-weight: 100;">V6.0</span></div>
        <div style="font-size: 10px; background: #2b2f36; padding: 4px 10px; border-radius: 20px;">LIVE 5M DATA</div>
    </div>

    <div class="grid">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="pair-title">BTC / USDT</span>
                <span style="font-size: 10px; color: var(--green);">● ACTIVE</span>
            </div>
            <div id="btc-price" class="price-main">--</div>
            <div id="btc-sig" class="signal-badge wait-style">ANALYZING...</div>
            
            <div class="acc-bar"><div class="acc-fill"></div></div>
            
            <div class="stats-row">
                <div><span style="color: #848e9c;">SL</span><br><b id="btc-sl" style="color: var(--red);">--</b></div>
                <div style="text-align: center;"><span style="color: #848e9c;">ENTRY</span><br><b id="btc-entry">--</b></div>
                <div style="text-align: right;"><span style="color: #848e9c;">TP</span><br><b id="btc-tp" style="color: var(--green);">--</b></div>
            </div>
        </div>
    </div>

    <div id="tv-chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        async function fetchMarket() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const data = await res.json();
                const price = parseFloat(data.lastPrice);
                const change = parseFloat(data.priceChangePercent);

                document.getElementById('btc-price').innerText = "$" + price.toLocaleString();
                document.getElementById('btc-entry').innerText = price.toFixed(2);
                
                const btcSig = document.getElementById('btc-sig');
                if (change > 0.40) {
                    btcSig.innerText = "EXTREME BUY ▲";
                    btcSig.className = "signal-badge buy-style";
                    document.getElementById('btc-sl').innerText = (price * 0.996).toFixed(2);
                    document.getElementById('btc-tp').innerText = (price * 1.018).toFixed(2);
                } else if (change < -0.40) {
                    btcSig.innerText = "EXTREME SELL ▼";
                    btcSig.className = "signal-badge sell-style";
                    document.getElementById('btc-sl').innerText = (price * 1.004).toFixed(2);
                    document.getElementById('btc-tp').innerText = (price * 0.982).toFixed(2);
                } else {
                    btcSig.innerText = "NEUTRAL / WAIT";
                    btcSig.className = "signal-badge wait-style";
                }
            } catch (e) { console.log("Updating..."); }
        }

        setInterval(fetchMarket, 2000);
        fetchMarket();

        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "container_id": "tv-chart",
            "hide_top_toolbar": false,
            "backgroundColor": "#05070a",
            "gridColor": "rgba(43, 47, 54, 0.5)"
        });
    </script>
</body>
</html>
