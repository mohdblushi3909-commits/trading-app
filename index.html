<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Strong Signal Terminal</title>
    <style>
        :root { --bg: #05070a; --card: #12151c; --accent: #f0b90b; --green: #02d39a; --red: #f6465d; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .tf-switcher { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; }
        .tf-btn { background: #1e2329; border: 1px solid #2b2f36; color: #848e9c; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .tf-btn.active { background: var(--accent); color: black; font-weight: bold; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #2b2f36; margin-bottom: 15px; text-align: center; position: relative; }
        
        /* Pulse Animation for Strong Signals */
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(2, 211, 154, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(2, 211, 154, 0); } 100% { box-shadow: 0 0 0 0 rgba(2, 211, 154, 0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(246, 70, 93, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(246, 70, 93, 0); } 100% { box-shadow: 0 0 0 0 rgba(246, 70, 93, 0); } }

        .signal-indicator { font-size: 18px; font-weight: 900; padding: 20px; border-radius: 15px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .strong-buy-bg { background: rgba(2, 211, 154, 0.2); color: var(--green); border: 2px solid var(--green); animation: pulse-green 2s infinite; }
        .strong-sell-bg { background: rgba(246, 70, 93, 0.2); color: var(--red); border: 2px solid var(--red); animation: pulse-red 2s infinite; }
        .no-trade { background: #1e2329; color: #4a4f55; border: 1px dashed #2b2f36; }

        .price-display { font-size: 34px; font-weight: 800; margin-bottom: 10px; }
        #action-area { display: none; }
        .trade-btn { width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: 900; font-size: 20px; margin-bottom: 15px; }
        
        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .level-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid #2b2f36; }
        #tv-chart { height: 400px; border-radius: 20px; border: 1px solid #2b2f36; overflow: hidden; }
    </style>
</head>
<body>

    <div class="tf-switcher">
        <button class="tf-btn" onclick="changeTF('1')">1M</button>
        <button class="tf-btn active" id="default-tf" onclick="changeTF('5')">5M</button>
        <button class="tf-btn" onclick="changeTF('15')">15M</button>
        <button class="tf-btn" onclick="changeTF('60')">1H</button>
    </div>

    <div class="card">
        <div id="price" class="price-display">--</div>
        
        <div id="signal-box" class="signal-indicator no-trade">
            🔍 SCANNING FOR STRONG TREND...
        </div>

        <div id="action-area">
            <button id="main-btn" class="trade-btn">--</button>
            <div class="levels">
                <div class="level-box"><span style="font-size:10px; color:#848e9c;">STOP LOSS</span><br><span id="sl" style="color:var(--red); font-weight:bold; font-size:16px;">--</span></div>
                <div class="level-box"><span style="font-size:10px; color:#848e9c;">TAKE PROFIT</span><br><span id="tp" style="color:var(--green); font-weight:bold; font-size:16px;">--</span></div>
            </div>
        </div>
    </div>

    <div id="tv-chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentInterval = '5';
        function loadChart(interval) {
            new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": interval,
                "timezone": "Etc/UTC", "theme": "dark", "style": "1",
                "container_id": "tv-chart", "hide_top_toolbar": false, "backgroundColor": "#05070a"
            });
        }

        function changeTF(tf) {
            currentInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadChart(tf);
        }

        async function updateAI() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const data = await res.json();
                const price = parseFloat(data.lastPrice);
                const change = parseFloat(data.priceChangePercent);

                document.getElementById('price').innerText = "$" + price.toLocaleString();
                
                const sigBox = document.getElementById('signal-box');
                const actionArea = document.getElementById('action-area');
                const mainBtn = document.getElementById('main-btn');

                // --- STRENGTH FILTER (High Threshold 0.60%) ---
                if (change > 0.60) {
                    sigBox.innerText = "🔥 STRONG BUY NOW";
                    sigBox.className = "signal-indicator strong-buy-bg";
                    actionArea.style.display = "block";
                    mainBtn.innerText = "BUY / LONG ▲";
                    mainBtn.style.background = "var(--green)";
                    mainBtn.style.color = "black";
                    document.getElementById('sl').innerText = (price * 0.994).toFixed(2);
                    document.getElementById('tp').innerText = (price * 1.02).toFixed(2);
                } else if (change < -0.60) {
                    sigBox.innerText = "💀 STRONG SELL NOW";
                    sigBox.className = "signal-indicator strong-sell-bg";
                    actionArea.style.display = "block";
                    mainBtn.innerText = "SELL / SHORT ▼";
                    mainBtn.style.background = "var(--red)";
                    mainBtn.style.color = "white";
                    document.getElementById('sl').innerText = (price * 1.006).toFixed(2);
                    document.getElementById('tp').innerText = (price * 0.98).toFixed(2);
                } else {
                    sigBox.innerText = "🔍 WAITING FOR STRONG SIGNAL...";
                    sigBox.className = "signal-indicator no-trade";
                    actionArea.style.display = "none";
                }
            } catch (e) { }
        }

        setInterval(updateAI, 2000);
        updateAI();
        loadChart('5');
    </script>
</body>
</html>
