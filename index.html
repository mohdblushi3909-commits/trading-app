<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Active Scalper</title>
    <style>
        :root { --bg: #05070a; --card: #12151c; --accent: #f0b90b; --green: #02d39a; --red: #f6465d; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .tf-switcher { display: flex; justify-content: center; gap: 5px; margin-bottom: 12px; }
        .tf-btn { background: #1e2329; border: 1px solid #2b2f36; color: #848e9c; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .tf-btn.active { background: var(--accent); color: black; font-weight: bold; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #2b2f36; margin-bottom: 15px; text-align: center; }
        .price-display { font-size: 34px; font-weight: 800; margin-bottom: 10px; color: white; }
        
        .signal-indicator { font-size: 18px; font-weight: 900; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-transform: uppercase; border: 1px solid transparent; }
        .buy-mode { background: rgba(2, 211, 154, 0.15); color: var(--green); border-color: var(--green); }
        .sell-mode { background: rgba(246, 70, 93, 0.15); color: var(--red); border-color: var(--red); }
        .neutral-mode { background: #1e2329; color: #848e9c; border-color: #2b2f36; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .trade-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-size: 16px; text-transform: uppercase; }
        
        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .level-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid #2b2f36; }
        #tv-chart { height: 380px; border-radius: 20px; border: 1px solid #2b2f36; overflow: hidden; }
    </style>
</head>
<body>

    <div class="tf-switcher">
        <button class="tf-btn" onclick="changeTF('1')">1M</button>
        <button class="tf-btn active" id="default-tf" onclick="changeTF('5')">5M</button>
        <button class="tf-btn" onclick="changeTF('15')">15M</button>
        <button class="tf-btn" onclick="changeTF('60')">1H</button>
    </div>

    <div class="card">
        <div id="price" class="price-display">--</div>
        
        <div id="signal-box" class="signal-indicator neutral-mode">ANALYZING...</div>

        <div class="btn-group">
            <button id="buy-btn" class="trade-btn" style="background:var(--green); color:black;">BUY</button>
            <button id="sell-btn" class="trade-btn" style="background:var(--red); color:white;">SELL</button>
        </div>

        <div class="levels">
            <div class="level-box"><span style="font-size:10px; color:#848e9c;">STOP LOSS</span><br><span id="sl" style="color:var(--red); font-weight:bold;">--</span></div>
            <div class="level-box"><span style="font-size:10px; color:#848e9c;">TAKE PROFIT</span><br><span id="tp" style="color:var(--green); font-weight:bold;">--</span></div>
        </div>
    </div>

    <div id="tv-chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentInterval = '5';
        function loadChart(interval) {
            new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": interval,
                "theme": "dark", "container_id": "tv-chart", "backgroundColor": "#05070a"
            });
        }

        function changeTF(tf) {
            currentInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadChart(tf);
        }

        async function updateScalper() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const data = await res.json();
                const price = parseFloat(data.lastPrice);
                const change = parseFloat(data.priceChangePercent);

                document.getElementById('price').innerText = "$" + price.toLocaleString();
                const sigBox = document.getElementById('signal-box');

                // FAST SCALPING LOGIC (Lower Threshold 0.25%)
                if (change > 0.25) {
                    sigBox.innerText = "BUY SIGNAL ACTIVE ▲";
                    sigBox.className = "signal-indicator buy-mode";
                    document.getElementById('sl').innerText = (price * 0.997).toFixed(2);
                    document.getElementById('tp').innerText = (price * 1.01).toFixed(2);
                } else if (change < -0.25) {
                    sigBox.innerText = "SELL SIGNAL ACTIVE ▼";
                    sigBox.className = "signal-indicator sell-mode";
                    document.getElementById('sl').innerText = (price * 1.003).toFixed(2);
                    document.getElementById('tp').innerText = (price * 0.99).toFixed(2);
                } else {
                    sigBox.innerText = "MARKET STABLE - NEUTRAL";
                    sigBox.className = "signal-indicator neutral-mode";
                    document.getElementById('sl').innerText = "--";
                    document.getElementById('tp').innerText = "--";
                }
            } catch (e) { }
        }

        setInterval(updateScalper, 2000);
        updateScalper();
        loadChart('5');
    </script>
</body>
</html>
