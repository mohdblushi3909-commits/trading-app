<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Predator Elite V9.5 + Risk Manager</title>
    <style>
        :root { --bg: #050608; --card: #0e1117; --green: #00ffaa; --red: #ff3b5c; --accent: #f0b90b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .dashboard { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #1c212d; text-align: center; margin-bottom: 15px; }
        .price { font-size: 40px; font-weight: 900; margin: 10px 0; color: white; }
        
        /* Risk Calculator Box */
        .risk-box { background: rgba(240, 185, 11, 0.05); border: 1px dashed var(--accent); border-radius: 15px; padding: 15px; margin: 15px 0; display: flex; justify-content: space-around; align-items: center; }
        .risk-item { text-align: center; }
        .risk-label { font-size: 10px; color: #848e9c; display: block; margin-bottom: 4px; }
        .risk-value { font-size: 16px; font-weight: bold; color: var(--accent); }

        .signal-box { padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; border: 2px solid transparent; transition: 0.5s; }
        .buy { background: rgba(0, 255, 170, 0.1); color: var(--green); border-color: var(--green); }
        .sell { background: rgba(255, 59, 92, 0.1); color: var(--red); border-color: var(--red); }
        .wait { background: #161a23; color: #525f7a; }

        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .lvl-box { background: #161a23; padding: 12px; border-radius: 12px; border-left: 4px solid #333; }
        .lvl-box.sl { border-left-color: var(--red); }
        .lvl-box.tp { border-left-color: var(--green); }

        #tv-chart { height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid #1c212d; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div style="font-size: 12px; color: var(--accent);">ELITE PRO TERMINAL V9.5</div>
        <div id="price" class="price">--</div>

        <div class="risk-box">
            <div class="risk-item">
                <span class="risk-label">YOUR BALANCE</span>
                <span class="risk-value">$100</span>
            </div>
            <div class="risk-item">
                <span class="risk-label">MAX TRADE SIZE</span>
                <span id="trade-size" class="risk-value">$20</span>
            </div>
            <div class="risk-item">
                <span class="risk-label">LEVERAGE</span>
                <span class="risk-value">10X-20X</span>
            </div>
        </div>
        
        <div id="signal" class="signal-box wait">Scanning Market...</div>

        <div class="levels" id="lvl-container" style="display: none;">
            <div class="lvl-box sl">
                <span style="font-size: 10px; color: #848e9c; display: block;">STOP LOSS</span>
                <span id="sl" style="font-size: 16px; font-weight: bold; color: var(--red);">--</span>
            </div>
            <div class="lvl-box tp">
                <span style="font-size: 10px; color: #848e9c; display: block;">TAKE PROFIT</span>
                <span id="tp" style="font-size: 16px; font-weight: bold; color: var(--green);">--</span>
            </div>
        </div>
    </div>

    <div id="tv-chart"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "5", "theme": "dark", "container_id": "tv-chart", "style": "1" });

        async function analyze() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const d = await r.json();
                const p = parseFloat(d.lastPrice);
                const c = parseFloat(d.priceChangePercent);

                document.getElementById('price').innerText = "$" + p.toLocaleString();

                const sBox = document.getElementById('signal');
                const lBox = document.getElementById('lvl-container');
                const tSize = document.getElementById('trade-size');

                // POSITION SIZING LOGIC: Use only 20% of your wallet
                let wallet = 100; // Example wallet
                tSize.innerText = "$" + (wallet * 0.20).toFixed(0);

                // ACCURACY FILTER: Change must be strong (>0.70%)
                if (c > 0.70) {
                    sBox.innerText = "🚀 STRONG BUY (20% WALLET)";
                    sBox.className = "signal-indicator signal-box buy";
                    lBox.style.display = "grid";
                    document.getElementById('sl').innerText = (p * 0.992).toFixed(2); // 0.8% Gap for safety
                    document.getElementById('tp').innerText = (p * 1.020).toFixed(2);
                } else if (c < -0.70) {
                    sBox.innerText = "🔻 STRONG SELL (20% WALLET)";
                    sBox.className = "signal-indicator signal-box sell";
                    lBox.style.display = "grid";
                    document.getElementById('sl').innerText = (p * 1.008).toFixed(2);
                    document.getElementById('tp').innerText = (p * 0.980).toFixed(2);
                } else {
                    sBox.innerText = "⏳ NO TREND (DON'T TRADE)";
                    sBox.className = "signal-indicator signal-box wait";
                    lBox.style.display = "none";
                }
            } catch (e) {}
        }
        setInterval(analyze, 3000); analyze();
    </script>
</body>
</html>
