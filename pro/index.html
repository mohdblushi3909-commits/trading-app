<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro Terminal V11.0</title>
    <style>
        :root { --bg: #0b0e14; --card: #151a21; --gold: #f0b90b; --green: #00ffaa; --red: #ff3b5c; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .dashboard { background: var(--card); border-radius: 30px; padding: 25px; border: 1px solid #232a3b; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .price { font-size: 52px; font-weight: 900; margin: 15px 0; color: white; }
        .risk-manager { background: rgba(240, 185, 11, 0.05); border: 1px dashed var(--gold); border-radius: 20px; padding: 20px; margin: 20px 0; display: flex; justify-content: space-around; }
        .risk-val { font-size: 18px; font-weight: bold; color: var(--gold); }
        .signal-box { padding: 30px; border-radius: 25px; font-size: 24px; font-weight: 800; text-transform: uppercase; margin: 20px 0; border: 2px solid transparent; transition: 0.5s; }
        .buy { background: rgba(0, 255, 170, 0.1); color: var(--green); border-color: var(--green); }
        .sell { background: rgba(255, 59, 92, 0.1); color: var(--red); border-color: var(--red); }
        .wait { background: #1c212d; color: #525f7a; }
        .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .lvl-box { background: #1c212d; padding: 18px; border-radius: 20px; border-bottom: 5px solid #333; }
        #tv-chart { height: 450px; border-radius: 30px; margin-top: 20px; border: 1px solid #232a3b; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div style="font-size: 14px; color: var(--gold); font-weight: bold; letter-spacing: 2px;">ELITE PRO TERMINAL V11.0</div>
        <div id="price" class="price">$0.00</div>
        <div class="risk-manager">
            <div><span style="font-size:10px; color:#848e9c;">BALANCE</span><br><span class="risk-val">$100</span></div>
            <div><span style="font-size:10px; color:#848e9c;">LOT SIZE</span><br><span class="risk-val">0.01 - 0.02</span></div>
        </div>
        <div id="signal" class="signal-box wait">SCANNING GOLD MARKET...</div>
        <div class="levels" id="lvl-container" style="display: none;">
            <div class="lvl-box" style="border-color: var(--red);"><span style="color:#848e9c; font-size:10px;">STOP LOSS</span><br><span id="sl" style="color:var(--red); font-weight:bold; font-size:20px;">--</span></div>
            <div class="lvl-box" style="border-color: var(--green);"><span style="color:#848e9c; font-size:10px;">TAKE PROFIT</span><br><span id="tp" style="color:var(--green); font-weight:bold; font-size:20px;">--</span></div>
        </div>
    </div>
    <div id="tv-chart"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({ "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "5", "theme": "dark", "container_id": "tv-chart", "style": "1" });
        async function update() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
                const d = await r.json(); const p = parseFloat(d.lastPrice); const c = parseFloat(d.priceChangePercent);
                document.getElementById('price').innerText = "$" + p.toFixed(2);
                const sB = document.getElementById('signal'); const lC = document.getElementById('lvl-container');
                if (c > 0.22) { sB.innerText = "🔱 STRONG BUY GOLD"; sB.className = "signal-box buy"; lC.style.display = "grid"; document.getElementById('sl').innerText = (p - 4).toFixed(2); document.getElementById('tp').innerText = (p + 10).toFixed(2); }
                else if (c < -0.22) { sB.innerText = "🔥 STRONG SELL GOLD"; sB.className = "signal-box sell"; lC.style.display = "grid"; document.getElementById('sl').innerText = (p + 4).toFixed(2); document.getElementById('tp').innerText = (p - 10).toFixed(2); }
                else { sB.innerText = "⏳ GOLD WAITING..."; sB.className = "signal-box wait"; lC.style.display = "none"; }
            } catch (e) {}
        }
        setInterval(update, 3000); update();
    </script>
</body>
</html>
