<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro - Real Gold Sync</title>
    <style>
        :root { --bg: #0b1018; --card: #151a23; --gold: #f0b90b; --green: #00ffaa; --red: #ff3b5c; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .dashboard { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #232a3b; text-align: center; position: relative; z-index: 10; }
        .price-container { margin: 10px 0; height: 60px; display: flex; justify-content: center; align-items: center; }
        
        /* Kab Entry Karein Box */
        .advisor { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; margin: 15px 0; border: 1px solid #333; }
        #entry-status { font-size: 20px; font-weight: 800; text-transform: uppercase; }

        .sig-box { padding: 25px; border-radius: 20px; font-size: 24px; font-weight: 800; margin-bottom: 15px; border: 2px solid #2d3748; }
        .buy { border-color: var(--green); color: var(--green); background: rgba(0,255,170,0.05); }
        .sell { border-color: var(--red); color: var(--red); background: rgba(255,59,92,0.05); }
        
        #tv-chart { height: 500px; border-radius: 25px; margin-top: -10px; border: 1px solid #232a3b; }
        .hide-top { position: absolute; top: 120px; width: 100%; height: 50px; background: var(--bg); z-index: 5; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div style="font-size: 12px; color: var(--gold); font-weight: bold;">LIVE GOLD (XAUUSD) SYNC</div>
        
        <div class="price-container">
            <iframe src="https://www.tradingview.com/embed-widget/single-quote/?symbol=OANDA%3AXAUUSD&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
        </div>

        <div class="advisor">
            <span style="font-size: 10px; color: #848e9c;">AI ENTRY ADVISOR</span><br>
            <div id="entry-status">SCANNING CHART...</div>
        </div>

        <div id="signal" class="sig-box">WAITING...</div>
    </div>

    <div id="tv-chart"></div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Main Chart Load
        new TradingView.widget({
            "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "5", "theme": "dark", "container_id": "tv-chart", "style": "1", "hide_side_toolbar": true, "allow_symbol_change": false
        });

        // Entry Logic based on Price Action (Using Binance for trend only)
        async function checkTrend() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
                const d = await r.json();
                const c = parseFloat(d.priceChangePercent);
                
                const s = document.getElementById('signal');
                const e = document.getElementById('entry-status');

                if (c > 0.15) {
                    s.innerText = "STRONG BUY GOLD"; s.className = "sig-box buy";
                    e.innerText = "✅ ENTRY NOW"; e.style.color = "#00ffaa";
                } else if (c < -0.15) {
                    s.innerText = "STRONG SELL GOLD"; s.className = "sig-box sell";
                    e.innerText = "✅ ENTRY NOW"; e.style.color = "#ff3b5c";
                } else {
                    s.innerText = "WAITING..."; s.className = "sig-box";
                    e.innerText = "❌ NO ENTRY"; e.style.color = "#848e9c";
                }
            } catch (err) {}
        }

        setInterval(checkTrend, 4000);
        checkTrend();
    </script>
</body>
</html>
