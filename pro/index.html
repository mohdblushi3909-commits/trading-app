<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Pro - Stable V16</title>
    <style>
        :root { --bg: #06080c; --card: #11151c; --gold: #f0b90b; --green: #00ffaa; --red: #ff3b5c; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .dashboard { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #1c212d; text-align: center; }
        .switcher { display: flex; gap: 8px; margin-bottom: 15px; }
        .s-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1f26; color: white; font-weight: bold; cursor: pointer; }
        .s-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240, 185, 11, 0.1); }
        .price { font-size: 42px; font-weight: 900; margin: 10px 0; }
        .advisor { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .sig-box { padding: 20px; border-radius: 15px; font-size: 22px; font-weight: 800; margin-bottom: 15px; border: 2px solid #2d3748; }
        .buy { border-color: var(--green); color: var(--green); background: rgba(0, 255, 170, 0.05); }
        .sell { border-color: var(--red); color: var(--red); background: rgba(255, 59, 92, 0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .l-box { background: #1c212d; padding: 12px; border-radius: 10px; font-size: 13px; }
        #tv-chart { height: 450px; border-radius: 20px; margin-top: 15px; border: 1px solid #1c212d; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="switcher">
            <button id="g-btn" class="s-btn active" onclick="setMode('GOLD')">GOLD PRO</button>
            <button id="b-btn" class="s-btn" onclick="setMode('BTC')">BTC PRO</button>
        </div>
        <div id="price" class="price">LOADING...</div>
        <div class="advisor">
            <span style="font-size: 10px; color: #848e9c;">AI ENTRY ADVISOR</span><br>
            <div id="entry-msg" style="font-weight:bold; font-size:18px;">ANALYZING...</div>
        </div>
        <div id="signal" class="sig-box">SCANNING...</div>
        <div class="grid">
            <div class="l-box">SL: <span id="sl" style="color:var(--red); font-weight:bold;">--</span></div>
            <div class="l-box">TP: <span id="tp" style="color:var(--green); font-weight:bold;">--</span></div>
        </div>
    </div>
    <div id="tv-chart"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let mode = 'GOLD';
        function setMode(m) { mode = m; document.getElementById('g-btn').className = m==='GOLD'?'s-btn active':'s-btn'; document.getElementById('b-btn').className = m==='BTC'?'s-btn active':'s-btn'; loadChart(); }
        function loadChart() {
            document.getElementById('tv-chart').innerHTML = '';
            new TradingView.widget({ "autosize": true, "symbol": mode==='GOLD' ? "OANDA:XAUUSD" : "BINANCE:BTCUSDT", "interval": "5", "theme": "dark", "container_id": "tv-chart", "style": "1" });
        }
        async function update() {
            try {
                const sym = mode==='GOLD'?'PAXGUSDT':'BTCUSDT';
                const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol='+sym);
                const d = await r.json();
                let p = parseFloat(d.lastPrice);
                if(mode==='GOLD') p += 9.80; // Correcting price gap for Gold
                document.getElementById('price').innerText = "$" + p.toFixed(2);
                const c = parseFloat(d.priceChangePercent);
                const s = document.getElementById('signal');
                const e = document.getElementById('entry-msg');
                const th = mode==='GOLD'? 0.15 : 0.50;
                if(c > th) { s.innerText="STRONG BUY "+mode; s.className="sig-box buy"; e.innerText="✅ ENTRY NOW"; e.style.color="#00ffaa"; }
                else if(c < -th) { s.innerText="STRONG SELL "+mode; s.className="sig-box sell"; e.innerText="✅ ENTRY NOW"; e.style.color="#ff3b5c"; }
                else { s.innerText="WAITING..."; s.className="sig-box"; e.innerText="❌ NO ENTRY"; e.style.color="#848e9c"; }
                const gap = mode==='GOLD'?5.5:(p*0.005);
                document.getElementById('sl').innerText = (p-gap).toFixed(2);
                document.getElementById('tp').innerText = (p+(gap*2)).toFixed(2);
            } catch(err) {}
        }
        loadChart(); setInterval(update, 3000); update();
    </script>
</body>
</html>
